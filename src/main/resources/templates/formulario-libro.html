<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Libro</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        .form-container { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 400px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 5px; width: 100%; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Registrar Nuevo Libro</h2>
        
        <!-- th:object vincula el formulario a tu DTO -->
        <form th:action="@{/libros/guardar}" th:object="${libroDto}" method="post">
            
            <div class="form-group">
                <label for="isbn">ISBN:</label>
                <input type="text" id="isbn" th:field="*{isbn}" required />
            </div>

            <div class="form-group">
                <label for="nombre">Nombre del Libro:</label>
                <input type="text" id="nombre" th:field="*{nombre}" required />
            </div>

            <div class="form-group">
                <label for="autor">Autor:</label>
                <input type="text" id="autor" th:field="*{autor}" required />
            </div>

            <div class="form-group">
                <label for="descripcion">Descripción:</label>
                <textarea id="descripcion" th:field="*{descripcion}" rows="3"></textarea>
            </div>

            <button type="submit">Guardar Libro</button>
        </form>
    </div>

</body>
</html>
